<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FolioScout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/png" href="res/favicon.png"/>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.highcharts.com/stock/highstock.js"></script>
</head>
<body>
  <div id="mainContent">
    <div id="headlineWrap">
      <div id="netWorthDisplay">$0</div>
      <div id="gainHeadline">+$0 (+0.00%)</div>
    </div>
    <div id="chartArea">
      <button id="backToPortfolio" type="button" hidden>← Back to Portfolio</button>
      <div id="container"></div>
      <div id="rangeSelector" aria-label="Time range">
        <button type="button" class="range-btn" data-range="1d">1D</button>
        <button type="button" class="range-btn" data-range="1w">1W</button>
        <button type="button" class="range-btn" data-range="1m">1M</button>
        <button type="button" class="range-btn" data-range="3m">3M</button>
        <button type="button" class="range-btn" data-range="1y">1Y</button>
        <button type="button" class="range-btn" data-range="2y">2Y</button>
        <button type="button" class="range-btn" data-range="3y">3Y</button>
        <button type="button" class="range-btn" data-range="all">All</button>
      </div>
    </div>
    <aside id="holdingsPanel">
      <div class="holdings-header">
        <div class="holdings-title">Holdings</div>
        <button id="holdingsSettingsButton" class="holdings-settings-button" type="button" aria-label="Sidebar settings" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14 12.94a7.43 7.43 0 0 0 .05-.94 7.43 7.43 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.22 7.22 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.57.22-1.12.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.43 7.43 0 0 0-.05.94 7.43 7.43 0 0 0 .05.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.41 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.57-.22 1.12-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64Zm-7.14 2.56A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
          </svg>
        </button>
      </div>
      <div id="holdingsSettingsPanel" class="holdings-settings-panel" hidden>
        <div class="holdings-settings-group">
          <div class="holdings-settings-label">Sidebar metric</div>
          <label class="holdings-settings-option">
            <input type="radio" name="holdingsChangeMode" value="today" checked>
            <span>Today's change</span>
          </label>
          <label class="holdings-settings-option">
            <input type="radio" name="holdingsChangeMode" value="alltime">
            <span>All-time return</span>
          </label>
        </div>
        <div class="holdings-settings-group">
          <div class="holdings-settings-label">Show</div>
          <label class="holdings-settings-option">
            <input type="checkbox" name="holdingsMetricDollar" checked>
            <span>+$ gain</span>
          </label>
          <label class="holdings-settings-option">
            <input type="checkbox" name="holdingsMetricPercent" checked>
            <span>+% gain</span>
          </label>
        </div>
      </div>
    </aside>
  </div>

  <script src="src/config.js" defer></script>
  <script src="src/state.js" defer></script>
  <script src="src/format.js" defer></script>
  <script src="src/calculate.js" defer></script>
  <script src="src/dataLoader.js" defer></script>
  <script src="src/ui/animateText.js" defer></script>
  <script src="src/ui/createChart.js" defer></script>
  <script src="src/main.js" defer></script>
</body>
</html>
